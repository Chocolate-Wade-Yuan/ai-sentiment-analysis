<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 深度文本情感与意图分析系统 v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    backdropBlur: {
                        xs: '2px',
                    }
                }
            }
        }
    </script>
    <style>
        /* 自定义滑块样式 */
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #3b82f6;
            cursor: pointer;
            border-radius: 50%;
        }
        
        /* 页面平滑过渡 */
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        
        /* 加载动画 */
        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen font-sans">

    <header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="p-2.5 bg-blue-600 rounded-xl text-white shadow-md">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.364 6.364l-.707-.707M6.364 5.636l.707.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tighter text-gray-950 dark:text-white">AI <span class="text-blue-600">DeepInsight</span> <span class="text-xs font-mono px-2 py-0.5 bg-gray-100 dark:bg-gray-800 rounded text-gray-500">v2.0</span></h1>
            </div>
            
            <div class="flex items-center space-x-4">
                <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition">
                    <svg id="themeIcon" class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
                <div class="flex items-center space-x-3 border-l pl-4 border-gray-200 dark:border-gray-700">
                    <img src="https://api.dicebear.com/8.x/initials/svg?seed=YWK&backgroundColor=00897b,00acc1,039be5" alt="Avatar" class="w-10 h-10 rounded-full border-2 border-blue-100 dark:border-blue-900"/>
                    <div>
                        <p class="font-bold text-base text-gray-950 dark:text-white">原伟康</p>
                        <p class="font-mono text-xs text-blue-600 dark:text-blue-400">ID: 202335020648</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white dark:bg-gray-900 p-7 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-800">
                    <label for="inputText" class="block text-lg font-semibold mb-3 text-gray-900 dark:text-white flex items-center">
                        <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        文本输入源
                    </label>
                    <textarea id="inputText" class="w-full h-64 p-4 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all resize-none font-mono text-sm" placeholder="在此输入或粘贴需要深度分析的文本...&#10;支持多段落，AI 将分析其整体情感倾向和具体情绪。"></textarea>
                    
                    <div class="mt-5 flex items-center justify-between gap-4">
                        <div class="text-sm text-gray-500 dark:text-gray-400">当前状态: <span id="statusBadge" class="text-gray-400">待机</span></div>
                        <button id="analyzeBtn" onclick="runDeepAnalysis()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-all transform hover:-translate-y-0.5 flex items-center space-x-2">
                            <svg id="btnIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            <span>启动深度分析</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                
                <div id="placeholderArea" class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-800 p-16 flex flex-col items-center justify-center text-center transition-all">
                    <div class="p-6 bg-blue-50 dark:bg-blue-950 rounded-full mb-6 text-blue-500">
                        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-2">准备就绪</h3>
                    <p class="text-gray-500 dark:text-gray-400 max-w-sm">请在左侧输入文本并点击“启动深度分析”。AI 模型将为您提供多维度的情感报告和文本统计。</p>
                </div>

                <div id="resultContent" class="hidden space-y-8 transition-all opacity-0 scale-95">
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white dark:bg-gray-900 p-6 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-800 relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-3 bg-green-500/10 text-green-500 rounded-bl-xl" id="sentimentIcon bg">
                                <svg id="sentimentIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
                            </div>
                            <p class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">主导情感倾斜</p>
                            <p id="primarySentiment" class="text-3xl font-extrabold tracking-tight text-gray-950 dark:text-white">--</p>
                            <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 mt-4 overflow-hidden">
                                <div id="sentimentBar" class="h-2 bg-green-500 transition-all duration-500" style="width: 0%"></div>
                            </div>
                        </div>
                        
                        <div class="bg-white dark:bg-gray-900 p-6 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-800">
                            <p class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">AI 综合置信度</p>
                            <p id="confidenceValue" class="text-3xl font-extrabold tracking-tight text-blue-600">--</p>
                            <p class="text-xs text-gray-400 mt-2">基于 NLP 模型概率加权计算</p>
                        </div>

                        <div class="bg-white dark:bg-gray-900 p-6 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-800 grid grid-cols-2 gap-2">
                            <div class="bg-gray-50 dark:bg-gray-800 p-3 rounded-lg text-center">
                                <p class="text-xs text-gray-500">字符数</p>
                                <p id="charCount" class="text-xl font-bold">0</p>
                            </div>
                            <div class="bg-gray-50 dark:bg-gray-800 p-3 rounded-lg text-center">
                                <p class="text-xs text-gray-500">易读性评估</p>
                                <p id="readabilityScore" class="text-xl font-bold text-orange-500">--</p>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-5 gap-6">
                        <div class="md:col-span-3 bg-white dark:bg-gray-900 p-6 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-800 flex flex-col items-center">
                            <h4 class="text-base font-semibold mb-4 text-gray-900 dark:text-white self-start">多维情绪强度分布 (模型演练)</h4>
                            <div class="w-full h-64 flex justify-center items-center">
                                <canvas id="emotionRadarChart"></canvas>
                            </div>
                        </div>
                        
                        <div class="md:col-span-2 bg-white dark:bg-gray-900 p-6 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-800">
                            <h4 class="text-base font-semibold mb-4 text-gray-900 dark:text-white">核心关键词提取</h4>
                            <div id="keywordsList" class="flex flex-wrap gap-2.5">
                                </div>
                            <div class="mt-8 pt-5 border-t border-gray-100 dark:border-gray-800">
                                <p class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">潜在意图识别</p>
                                <span id="intentTag" class="px-3 py-1 text-xs font-medium rounded-full bg-purple-50 dark:bg-purple-950 text-purple-700 dark:text-purple-300 border border-purple-100 dark:border-purple-800">待分析...</span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. 初始化 Chart.js 全局配置
        Chart.defaults.color = document.documentElement.classList.contains('dark') ? '#94a3b8' : '#64748b';
        Chart.defaults.font.family = 'ui-sans-serif, system-ui, sans-serif';

        let emotionChart;

        // 2. 暗色模式切换逻辑
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateChartTheme(isDark);
            
            // 更新图标
            const icon = document.getElementById('themeIcon');
            if (isDark) {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.364 6.364l-.707-.707M6.364 5.636l.707.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>';
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
            }
        }

        // 初始化检查本地存储
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            toggleDarkMode(); // 调用一次来设置图标和Chart
            toggleDarkMode(); // 再调一次切回来，只是为了初始化图标逻辑
        }

        function updateChartTheme(isDark) {
            const color = isDark ? '#94a3b8' : '#64748b';
            const gridColor = isDark ? 'rgba(148, 163, 184, 0.1)' : 'rgba(100, 116, 139, 0.1)';
            
            Chart.defaults.color = color;
            if (emotionChart) {
                emotionChart.options.scales.r.pointLabels.color = color;
                emotionChart.options.scales.r.grid.color = gridColor;
                emotionChart.options.scales.r.angleLines.color = gridColor;
                emotionChart.update();
            }
        }

        // 3. 核心：深度情感分析模拟逻辑
        function runDeepAnalysis() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) { alert("请输入内容！"); return; }

            // UI 状态更新：进入加载状态
            toggleLoading(true);

            // 模拟 API 网络延迟 (2.5秒，模拟更复杂的模型推演)
            setTimeout(() => {
                
                // --- 模拟 AI 核心算法实现迁移与优化 ---

                // A. 基础文本统计
                const charCount = text.length;
                const sentenceCount = text.split(/[.!?。！？]/).filter(Boolean).length;
                let readability = "一般";
                if(charCount > 0) {
                    const avgLen = charCount / (sentenceCount || 1);
                    readability = avgLen > 30 ? "略显冗长" : (avgLen < 10 ? "简洁有力" : "通顺易读");
                }

                // B. 多维情绪评分模拟 (基于词库匹配和轻量级概率)
                const scores = calculateEmotionScores(text);
                
                // C. 计算主导情感倾向
                const sentimentResult = determineSentiment(scores);

                // D. 模拟置信度和关键词
                const confidence = (0.88 + Math.random() * 0.11).toFixed(4); // 88% - 99%
                const mockKeywords = extractMockKeywords(text);
                const mockIntent = charCount > 20 && scores.anger > 30 ? "投诉/不满" : (scores.joy > 40 ? "表扬/反馈" : "信息咨询");

                // E. 更新 UI 界面
                updateUIResults({
                    charCount,
                    readability,
                    scores,
                    sentimentResult,
                    confidence,
                    mockKeywords,
                    mockIntent
                });

                toggleLoading(false);
            }, 2500);
        }

        // 辅助函数：切换加载状态
        function toggleLoading(isLoading) {
            const btn = document.getElementById('analyzeBtn');
            const btnText = btn.querySelector('span');
            const btnIcon = document.getElementById('btnIcon');
            const statusBadge = document.getElementById('statusBadge');
            const placeholder = document.getElementById('placeholderArea');
            const content = document.getElementById('resultContent');

            if (isLoading) {
                btn.disabled = true;
                btn.classList.add('opacity-70', 'cursor-not-allowed');
                btnText.innerText = 'DeepInsight 推理中...';
                btnIcon.innerHTML = '<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
                statusBadge.innerText = '计算中...';
                statusBadge.className = 'text-blue-500 animate-pulse';
                
                placeholder.classList.add('hidden');
                content.classList.add('hidden');
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                btnText.innerText = '启动深度分析';
                btnIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>';
                statusBadge.innerText = '分析完成';
                statusBadge.className = 'text-green-500';

                content.classList.remove('hidden');
                setTimeout(()=> { // 增加淡入动画
                    content.classList.remove('opacity-0', 'scale-95');
                    content.classList.add('opacity-100', 'scale-100');
                }, 50);
            }
        }

        // 模拟情绪分析算法
        function calculateEmotionScores(text) {
            // 简单的关键词匹配字典
            const dict = {
                joy: ['开心', '棒', '喜欢', '成功', '前沿', '快乐', '成就感', '完美', '赞'],
                anger: ['差', '糟糕', '讨厌', '垃圾', '愤怒', '生气', '死机', 'bug', '什么玩意'],
                sadness: ['难过', '失败', '痛苦', '累', '伤心', '失望', '由于', '遗憾'],
                fear: ['害怕', '担心', '焦虑', '密码泄露', '危险', '恐怖', '不知道怎么办'],
                surprise: ['竟然', '居然', '哇', '没想到', '震惊', '原来如此']
            };

            const scores = { joy: 5, anger: 5, sadness: 5, fear: 5, surprise: 5 }; // 基础分

            for (const emotion in dict) {
                dict[emotion].forEach(word => {
                    if (text.includes(word)) {
                        scores[emotion] += 20; // 匹配到一个词+20分
                    }
                });
                // 随机扰动，让演示看起来更真实
                scores[emotion] += Math.floor(Math.random() * 15);
                if(scores[emotion] > 100) scores[emotion] = 98;
            }
            return scores;
        }

        // 确定主导情感倾向
        function determineSentiment(scores) {
            const pos = scores.joy;
            const neg = (scores.anger + scores.sadness + scores.fear) / 3;
            
            if (pos > neg + 15) return { text: "积极正面", color: "text-green-500", bar: "bg-green-500", icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>' };
            if (neg > pos + 15) return { text: "消极负面", color: "text-red-500", bar: "bg-red-500", icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>' };
            return { text: "中性客观", color: "text-gray-500", bar: "bg-gray-500", icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>' };
        }

        // 模拟关键词提取
        function extractMockKeywords(text) {
            // 简单演示：提取较长的词或预设词
            const commonWords = ['技术', 'AI', '大模型', '项目', '原伟康', '学号', '情感', '作业'];
            let found = [];
            commonWords.forEach(w => { if(text.includes(w)) found.push(w); });
            
            // 如果没匹配到，截取前几个字作为演示
            if(found.length === 0 && text.length > 4) {
                found = [text.substring(0,2), text.substring(2,5)];
            } else if (found.length === 0) {
                 found = ['短文本'];
            }
            return [...new Set(found)]; // 去重
        }

        // F. 更新结果界面内容
        function updateUIResults(data) {
            // 文本统计
            document.getElementById('charCount').innerText = data.charCount;
            document.getElementById('readabilityScore').innerText = data.readability;

            // 主导情感
            const sentEl = document.getElementById('primarySentiment');
            sentEl.innerText = data.sentimentResult.text;
            sentEl.className = `text-3xl font-extrabold tracking-tight ${data.sentimentResult.color}`;
            
            const bar = document.getElementById('sentimentBar');
            bar.className = `h-2 transition-all duration-500 ${data.sentimentResult.bar}`;
            setTimeout(() => bar.style.width = '100%', 100); // 增加进度条动画效果

            const icon = document.getElementById('sentimentIcon');
            icon.innerHTML = data.sentimentResult.icon;
            icon.parentNode.className = `absolute top-0 right-0 p-3 rounded-bl-xl ${data.sentimentResult.color.replace('text','bg')}/10 ${data.sentimentResult.color}`;

            // 置信度
            document.getElementById('confidenceValue').innerText = (data.confidence * 100).toFixed(2) + '%';

            // 关键词
            const kwContainer = document.getElementById('keywordsList');
            kwContainer.innerHTML = '';
            data.mockKeywords.forEach(kw => {
                kwContainer.innerHTML += `<span class="bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-xs font-semibold px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-700 hover:border-blue-300 dark:hover:border-blue-700 transition cursor-default">${kw}</span>`;
            });

            // 意图
            document.getElementById('intentTag').innerText = data.mockIntent;

            // 更新雷达图
            updateRadarChart(data.scores);
        }

        // G. 雷达图绘制与更新
        function updateRadarChart(scores) {
            const chartData = [scores.joy, scores.anger, scores.sadness, scores.fear, scores.surprise];
            const ctx = document.getElementById('emotionRadarChart').getContext('2d');
            const isDark = document.documentElement.classList.contains('dark');
            const gridColor = isDark ? 'rgba(148, 163, 184, 0.1)' : 'rgba(100, 116, 139, 0.1)';

            if (emotionChart) {
                emotionChart.data.datasets[0].data = chartData;
                emotionChart.update();
            } else {
                emotionChart = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: ['喜悦 (Joy)', '愤怒 (Anger)', '悲伤 (Sad)', '恐惧 (Fear)', '惊讶 (Surprise)'],
                        datasets: [{
                            label: '情绪强度评分',
                            data: chartData,
                            fill: true,
                            backgroundColor: 'rgba(59, 130, 246, 0.2)',
                            borderColor: '#3b82f6',
                            pointBackgroundColor: '#3b82f6',
                            pointBorderColor: '#fff',
                            pointHoverBackgroundColor: '#fff',
                            pointHoverBorderColor: '#3b82f6',
                            borderWidth: 2,
                            tension: 0.1 // 稍微平滑一点的线条
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        elements: {
                            line: { borderWidth: 2 }
                        },
                        scales: {
                            r: {
                                angleLines: { color: gridColor },
                                grid: { color: gridColor },
                                faceOn: false,
                                suggestedMin: 0,
                                suggestedMax: 100,
                                ticks: { display: false, stepSize: 20 },
                                pointLabels: {
                                    font: { size: 12, weight: '500' },
                                    color: isDark ? '#94a3b8' : '#64748b'
                                }
                            }
                        },
                        plugins: {
                            legend: { display: false }, // 隐藏顶部的 dataset 标签
                            tooltip: {
                                backgroundColor: isDark ? '#1f2937' : '#fff',
                                titleColor: isDark ? '#fff' : '#1f2937',
                                bodyColor: isDark ? '#e5e7eb' : '#4b5563',
                                borderColor: gridColor,
                                borderWidth: 1,
                                padding: 10,
                                cornerRadius: 8,
                                displayColors: false
                            }
                        }
                    }
                });
            }
        }
    </script>
</body>
</html>
